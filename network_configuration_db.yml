
- name: Network and firewall configuration for Database
  hosts: db_servers
  become: yes
  vars:
    # IP Twojego serwera aplikacyjnego (pobierane z grupy app_servers)
    app_server_ip: "{{ hostvars[groups['app_servers'][0]]['ansible_host'] }}"
  tasks:   
    - name: DB | Configure Postgres to listen on all interfaces
      lineinfile:
        path: /etc/postgresql/13/main/postgresql.conf
        regexp: "^#?listen_addresses ="
        line: "listen_addresses = '*'"
      notify: Restart Postgres

    - name: DB | Allow authentication from App Server IP in pg_hba.conf
      lineinfile:
        path: /etc/postgresql/13/main/pg_hba.conf
        line: "host all all {{ app_server_ip }}/32 md5"
      notify: Restart Postgres

    # --- KONFIGURACJA FIREWALLA (UFW) ---
    - name: Install UFW firewall tool
      apt:
        name: ufw
        state: present
        update_cache: yes

    - name: UFW | Allow SSH traffic (To prevent lockout!)
      community.general.ufw:
        rule: allow
        port: '22'
        proto: tcp

    - name: UFW | Allow Postgres access (5432) ONLY from App Server
      community.general.ufw:
        rule: allow
        port: '5432'
        proto: tcp
        from_ip: "{{ app_server_ip }}"

    - name: UFW | Enable firewall and set default deny policy
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

  handlers:
    - name: Restart Postgres
      service:
        name: postgresql
        state: restarted
